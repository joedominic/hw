{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}AI Resume Optimizer{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'resume_optimizer' %}">AI Resume Optimizer</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link{% if request.resolver_match.url_name == 'resume_optimizer' %} active{% endif %}"
                       href="{% url 'resume_optimizer' %}">
                        Optimizer
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.resolver_match.url_name == 'jobs_search' %} active{% endif %}"
                       href="{% url 'jobs_search' %}">
                        Job Search
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.resolver_match.url_name == 'jobs_keywords' %} active{% endif %}"
                       href="{% url 'jobs_keywords' %}">
                        Keyword Search
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.resolver_match.url_name == 'prompt_library' %} active{% endif %}"
                       href="{% url 'prompt_library' %}">
                        Prompts
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.resolver_match.url_name == 'workflow_list' or request.resolver_match.url_name == 'workflow_create' or request.resolver_match.url_name == 'workflow_edit' %} active{% endif %}"
                       href="{% url 'workflow_list' %}">
                        Workflows
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{% if request.resolver_match.url_name == 'settings' %} active{% endif %}"
                       href="{% url 'settings' %}">
                        Settings
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container mb-5">
    {% block content %}{% endblock %}
</main>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
></script>
{% block extra_js %}{% endblock %}
</body>
</html>
